name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv pip install ruff
      - run: ruff check tts-service/app/
      - run: ruff format --check tts-service/app/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install dependencies
        run: |
          uv pip install -r tts-service/requirements.txt
        working-directory: .
      - name: Run tests
        run: python -m pytest tts-service/tests/ -v --tb=short
        working-directory: .
        env:
          HARDWARE_TIER: cpu_only
          REDIS_URL: ""
          VOICE_SAMPLE_PATH: /dev/null
