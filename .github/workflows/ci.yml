name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        working-directory: tts-service
        run: ruff check app/

      - name: Check formatting
        working-directory: tts-service
        run: ruff format --check app/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: tts-service
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: tts-service
        run: python -m pytest tests/ -v --tb=short
        env:
          HARDWARE_TIER: cpu_only
          REDIS_URL: ""
          VOICE_SAMPLE_PATH: /dev/null
