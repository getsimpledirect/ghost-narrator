name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check tts-service/app/
      - run: ruff format --check tts-service/app/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install fastapi uvicorn pydantic
          pip install pydub openai redis
        working-directory: tts-service
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        working-directory: tts-service
        env:
          HARDWARE_TIER: cpu_only
          REDIS_URL: ""
          VOICE_SAMPLE_PATH: /dev/null
