name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Prepare changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CLEAN_VERSION="${VERSION#v}"
          
          # Get the previous tag for comparison
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          # Generate changelog using git log
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "$PREV_TAG..HEAD" --pretty=format:"- %s (%h)" --grep -v -E "^(Merge|Revert)" || true)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" -n 20 || true)
          fi
          
          # Build a clean release note
          cat > release_notes.md << 'HEADER'
          ## What's Changed
          
          HEADER
          
          echo "$CHANGES" >> release_notes.md
          
          # Add贡献者 section
          echo -e "\n## Contributors" >> release_notes.md
          echo "$(git shortlog -sn --no-merges | head -5 | sed 's/^[0-9]*[[:space:]]*/- /')" >> release_notes.md
          
          # If empty, add fallback
          if [ ! -s release_notes.md ] || [ $(wc -l < release_notes.md) -le 2 ]; then
            cat > release_notes.md << 'FALLBACK'
          ## What's Changed
          
          See commit history for details.
          
          ## Contributors
          
          - See commit history
          FALLBACK
          fi
          
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') }}