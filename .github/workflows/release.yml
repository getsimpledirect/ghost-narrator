name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        id: changelog
        run: |
          CURRENT_TAG="v${{ steps.version.outputs.VERSION }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null | sed 's/^v//')
          
          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md
          
          if [ -n "$PREV_TAG" ]; then
            echo "Changes from v$PREV_TAG to $CURRENT_TAG:" >> release_notes.md
            echo "" >> release_notes.md
            git log "v$PREV_TAG..HEAD" --format="* %s (%h)" --no-merges | grep -v "^$" >> release_notes.md || true
          else
            echo "First release! Changes from initial commit:" >> release_notes.md
            echo "" >> release_notes.md
            git log --format="* %s (%h)" --no-merges -n 30 | grep -v "^$" >> release_notes.md || true
          fi
          
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "*Full Changelog*: https://github.com/${{ github.repository }}/compare/v$PREV_TAG...$CURRENT_TAG" >> release_notes.md
          
          cat release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: "Release ${{ steps.version.outputs.VERSION }}"
          body_path: release_notes.md
          draft: false
          generate_release_notes: false