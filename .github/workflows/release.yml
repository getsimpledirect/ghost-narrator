name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        id: changelog
        run: |
          CURRENT_TAG="v${{ steps.version.outputs.VERSION }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null | sed 's/^v//')
          
          # Initialize sections
          FEATURES=""
          BUG_FIXES=""
          PERFORMANCE=""
          DOCS=""
          OTHER=""
          
          # Categorize commits
          git log "v$PREV_TAG..HEAD" --format="* %s (%h)" --no-merges | while read -r line; do
            case "$line" in
              feat*|feat!*) FEATURES="$FEATURES"$'\n'"$line" ;;
              fix*|fix!*) BUG_FIXES="$BUG_FIXES"$'\n'"$line" ;;
              perf*) PERFORMANCE="$PERFORMANCE"$'\n'"$line" ;;
              docs*) DOCS="$DOCS"$'\n'"$line" ;;
              *) OTHER="$OTHER"$'\n'"$line" ;;
            esac
          done
          
          {
            echo "## What's Changed"
            echo ""
            
            # Features
            if [ -n "$FEATURES" ]; then
              echo "### ✨ Features"
              echo "$FEATURES"
              echo ""
            fi
            
            # Bug Fixes
            if [ -n "$BUG_FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$BUG_FIXES"
              echo ""
            fi
            
            # Performance
            if [ -n "$PERFORMANCE" ]; then
              echo "### ⚡ Performance"
              echo "$PERFORMANCE"
              echo ""
            fi
            
            # Docs
            if [ -n "$DOCS" ]; then
              echo "### 📝 Documentation"
              echo "$DOCS"
              echo ""
            fi
            
            # Other
            if [ -n "$OTHER" ]; then
              echo "### 🔧 Other Changes"
              echo "$OTHER"
              echo ""
            fi
            
            echo "---"
            echo "*Full Changelog*: https://github.com/${{ github.repository }}/compare/v$PREV_TAG...$CURRENT_TAG"
          } > release_notes.md
          
          cat release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: "Release ${{ steps.version.outputs.VERSION }}"
          body_path: release_notes.md
          draft: false
          generate_release_notes: false