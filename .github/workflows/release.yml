name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        id: changelog
        run: |
          CURRENT_TAG="v${{ steps.version.outputs.VERSION }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null | sed 's/^v//')
          
          # Create temp files for each category
          touch features.txt bugfixes.txt performance.txt docs.txt other.txt
          
          # Categorize commits using a script that writes to temp files
          while IFS= read -r line; do
            case "$line" in
              feat*|feat!*) echo "$line" >> features.txt ;;
              fix*|fix!*) echo "$line" >> bugfixes.txt ;;
              perf*) echo "$line" >> performance.txt ;;
              docs*) echo "$line" >> docs.txt ;;
              *) echo "$line" >> other.txt ;;
            esac
          done < <(git log "v$PREV_TAG..HEAD" --format="* %s (%h)" --no-merges || true)
          
          # Build release notes
          {
            echo "## What's Changed"
            echo ""
            
            # Features
            if [ -s features.txt ]; then
              echo "### ✨ Features"
              cat features.txt
              echo ""
            fi
            
            # Bug Fixes
            if [ -s bugfixes.txt ]; then
              echo "### 🐛 Bug Fixes"
              cat bugfixes.txt
              echo ""
            fi
            
            # Performance
            if [ -s performance.txt ]; then
              echo "### ⚡ Performance"
              cat performance.txt
              echo ""
            fi
            
            # Docs
            if [ -s docs.txt ]; then
              echo "### 📝 Documentation"
              cat docs.txt
              echo ""
            fi
            
            # Other
            if [ -s other.txt ]; then
              echo "### 🔧 Other Changes"
              cat other.txt
              echo ""
            fi
            
            echo "---"
            echo "*Full Changelog*: https://github.com/${{ github.repository }}/compare/v$PREV_TAG...$CURRENT_TAG"
          } > release_notes.md
          
          cat release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: "Release ${{ steps.version.outputs.VERSION }}"
          body_path: release_notes.md
          draft: false
          generate_release_notes: false