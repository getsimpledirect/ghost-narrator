# Commitizen is used for commit message validation only.
# Versioning and releases are handled by python-semantic-release (pyproject.toml).
[tool.commitizen]
name = "cz_conventional_commits"

[tool.commitizen.customize]
message_template = "{{change_type}}: {{message}}"
example = "feat: add dynamic site support"
schema_pattern = "(feat|fix|docs|style|refactor|perf|test|chore|revert|ci)"
